<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件管理</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f1f5f9; }
    select, input, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Supabase設定 ─────────────────────────────────────────
    const SUPABASE_URL = "https://nktwovvkirfgclvcietq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rdHdvdnZraXJmZ2NsdmNpZXRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjM4OTYsImV4cCI6MjA5NTY5OTg5Nn0.MtuDR6ktLbERQrLa9chwsyrNkG2x7ogU_H7hNobFtaw";
    const APP_PASSWORD = "pw8835441";
    const SAVE_MS = 2000;

    async function sbLoad() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/haisen_data?id=eq.main&select=cases,clients,meetings,updated_at`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      if (!res.ok) throw new Error(`load error ${res.status}`);
      const rows = await res.json();
      return rows[0] || { cases: [], clients: [], meetings: [], updated_at: null };
    }
    async function sbCheckUpdatedAt() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/haisen_data?id=eq.main&select=updated_at`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      if (!res.ok) throw new Error(`check error ${res.status}`);
      const rows = await res.json();
      return rows[0]?.updated_at || null;
    }
    // updated_atの比較用。PostgreSQLはマイクロ秒精度、JSのtoISOStringはミリ秒精度のため
    // 文字列同士では一致しないことがある。実際の時刻（ミリ秒）に変換して比較する。
    function tsEqual(a, b) {
      if (!a || !b) return a === b;
      const ta = new Date(a).getTime();
      const tb = new Date(b).getTime();
      if (isNaN(ta) || isNaN(tb)) return a === b;
      return ta === tb;
    }
    async function sbSave(cases, clients, meetings) {
      const nowIso = new Date().toISOString();
      const res = await fetch(`${SUPABASE_URL}/rest/v1/haisen_data?id=eq.main`, {
        method: "PATCH",
        headers: {
          apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json", Prefer: "return=minimal"
        },
        body: JSON.stringify({ cases, clients, meetings, updated_at: nowIso })
      });
      if (!res.ok) throw new Error(`save error ${res.status}`);
      return nowIso;
    }

    // ─── 定数・ヘルパー ───────────────────────────────────────
    const STATUS_LIST = [
      { key:"inquiry",    label:"打診受付", color:"#64748b", bg:"#f1f5f9" },
      { key:"estimating", label:"見積中",   color:"#b45309", bg:"#fef3c7" },
      { key:"waiting",    label:"回答待ち", color:"#1d4ed8", bg:"#dbeafe" },
      { key:"ordered",    label:"受注",     color:"#15803d", bg:"#dcfce7" },
      { key:"inprogress", label:"進行中",   color:"#7c3aed", bg:"#ede9fe" },
      { key:"completed",  label:"完了",     color:"#374151", bg:"#e5e7eb" },
      { key:"lost",       label:"失注",     color:"#dc2626", bg:"#fee2e2" },
    ];
    const SHIP_TYPES = ["自社船","借り船（傭船）"];
    const nowStr  = () => new Date().toISOString().slice(0,16).replace("T"," ");
    const dateStr = () => new Date().toISOString().slice(0,10);
    const fmtYen  = v => v ? `¥${Number(v).toLocaleString()}` : "—";
    const emptyCase = () => ({
      id: String(Date.now()), clientId:"", contactId:"", client:"", contactName:"",
      title:"", status:"inquiry", inquiryDate:dateStr(),
      shipType:"自社船", shipName:"", estimateAmount:"", subEstimates:[],
      workUndecided:false, workYear:"", workMonth:"", workJun:"", notes:"",
      history:[{ date:nowStr(), text:"案件登録" }],
    });
    const emptySubEstimate = () => ({ id:String(Date.now()), vendor:"", amount:"" });
    const emptyContact     = () => ({ id:String(Date.now()), name:"", tel:"", email:"", memo:"" });
    const emptyMeeting = (caseId, clientId) => ({ id:String(Date.now()), date:dateStr(), caseId:caseId||"", clientId:clientId||"", contactId:"", content:"" });
    const JUN_LABELS = ["","上旬","中旬","下旬"];
    function fmtWorkTime(c) {
      if (c.workUndecided) return "時期未定";
      if (!c.workYear && !c.workMonth) return null;
      let s = c.workYear ? `${c.workYear}年` : "";
      if (c.workMonth) s += `${c.workMonth}月`;
      if (c.workJun) s += JUN_LABELS[c.workJun]||"";
      return s||null;
    }
    function clientDisplayName(c, clients) {
      const cid = String(c.clientId||"");
      if (cid && cid !== "__manual__") {
        const cl = clients.find(x => String(x.id) === cid);
        if (cl) return cl.name;
      }
      return c.client||"";
    }

    const S = {
      label: { display:"block", fontSize:11, color:"#64748b", marginBottom:3, fontWeight:700 },
      input: { width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, color:"#1e293b", background:"#f8fafc", boxSizing:"border-box" },
      btn: (bg, color="#fff") => ({ background:bg, color, border:"none", borderRadius:8, padding:"10px 18px", fontWeight:700, cursor:"pointer", fontSize:14 }),
    };

    function Field({ label, value, onChange, type="text", placeholder, rows }) {
      const el = rows
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} style={{...S.input,resize:"vertical"}} />
        : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={S.input} />;
      return <div style={{marginBottom:14}}><label style={S.label}>{label}</label>{el}</div>;
    }
    function StatusBadge({ statusKey, small }) {
      const s = STATUS_LIST.find(s=>s.key===statusKey)||STATUS_LIST[0];
      return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.color}44`, borderRadius:20, padding:small?"1px 8px":"3px 11px", fontSize:small?11:12, fontWeight:700, whiteSpace:"nowrap" }}>{s.label}</span>;
    }
    function TopBar({ title, onBack, right }) {
      return (
        <div style={{ background:"#0f2744", color:"#fff", padding:"13px 16px", display:"flex", alignItems:"center", gap:10, position:"sticky", top:0, zIndex:10 }}>
          {onBack && <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",lineHeight:1}}>←</button>}
          <span style={{flex:1, fontWeight:800, fontSize:16}}>{title}</span>
          {right}
        </div>
      );
    }
    function SaveIndicator({ state }) {
      const map = { saving:"保存中…", saved:"✓ 保存済み", error:"保存失敗（再試行します）", conflict:"⚠ 他の人の更新を確認中…" };
      const col  = { saving:"#94a3b8", saved:"#22c55e", error:"#ef4444", conflict:"#b45309" };
      if (state==="idle") return null;
      return <div style={{textAlign:"center",fontSize:11,color:col[state],padding:"4px 0",background:"#f0fdf4"}}>{map[state]}</div>;
    }
    function MeetingRow({ m, clients, cases, showCase, onDelete }) {
      const cl = clients.find(c=>String(c.id)===String(m.clientId));
      const ct = cl?.contacts?.find(c=>String(c.id)===String(m.contactId));
      const cs = cases.find(c=>String(c.id)===String(m.caseId));
      return (
        <div style={{borderLeft:"3px solid #cbd5e1",paddingLeft:12,position:"relative"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>{m.date}</span>
            {cl && <span style={{background:"#f1f5f9",fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:700,color:"#334155"}}>{cl.name}{ct&&`（${ct.name}）`}</span>}
            {showCase && cs && <span style={{background:"#dcfce7",fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:700,color:"#15803d"}}>{cs.title||"件名未入力"}</span>}
            {onDelete && <button onClick={onDelete} style={{marginLeft:"auto",background:"none",border:"none",color:"#cbd5e1",fontSize:12,cursor:"pointer"}}>✕</button>}
          </div>
          <div style={{fontSize:13,color:"#334155",marginTop:3,whiteSpace:"pre-wrap"}}>{m.content}</div>
        </div>
      );
    }
    function MeetingForm({ initialClientId, clients, onAdd }) {
      const [clientId, setClientId] = useState(initialClientId||"");
      const [contactId, setContactId] = useState("");
      const [date, setDate] = useState(dateStr());
      const [content, setContent] = useState("");
      const contacts = clients.find(c=>String(c.id)===String(clientId))?.contacts||[];
      function submit() {
        if (!content.trim()) return;
        onAdd({ date, clientId, contactId, content: content.trim() });
        setContent(""); setContactId("");
      }
      return (
        <div style={{background:"#f8fafc",borderRadius:10,padding:"12px 12px 10px",marginBottom:14,border:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...S.input,flex:1,fontSize:13,padding:"7px 9px"}} />
            <select value={clientId} onChange={e=>{setClientId(e.target.value);setContactId("");}} style={{...S.input,flex:2,fontSize:13,padding:"7px 9px"}}>
              <option value="">取引先を選択…</option>
              {clients.map(cl=><option key={cl.id} value={cl.id}>{cl.name}</option>)}
            </select>
          </div>
          {contacts.length>0 && <select value={contactId} onChange={e=>setContactId(e.target.value)} style={{...S.input,fontSize:13,padding:"7px 9px",marginBottom:8}}>
            <option value="">担当者（任意）</option>
            {contacts.map(ct=><option key={ct.id} value={ct.id}>{ct.name}</option>)}
          </select>}
          <textarea value={content} onChange={e=>setContent(e.target.value)} rows={3} placeholder="打合せ内容を入力…" style={{...S.input,resize:"vertical",marginBottom:8}} />
          <button onClick={submit} disabled={!content.trim()} style={{...S.btn("#0f2744"),width:"100%",fontSize:13,opacity:content.trim()?1:0.5}}>＋ 打合せ記録を追加</button>
        </div>
      );
    }
    function ConflictModal({ onReload, onForceSave }) {
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
          <div style={{background:"#fff",borderRadius:12,padding:"22px 20px",maxWidth:340,width:"100%",boxShadow:"0 8px 30px #0003"}}>
            <div style={{fontSize:15,fontWeight:800,color:"#92400e",marginBottom:10}}>⚠️ 他の人がデータを更新しました</div>
            <div style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:18}}>
              あなたが編集している間に、別の端末でデータが更新されました。このまま保存すると相手の変更が消えてしまう可能性があります。
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={onReload} style={{...S.btn("#0f2744"),width:"100%"}}>最新データを取得する（自分の変更は失われます）</button>
              <button onClick={onForceSave} style={{...S.btn("#fee2e2","#dc2626"),width:"100%"}}>それでも自分の変更で上書き保存する</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── パスワード画面 ───────────────────────────────────────
    function PasswordScreen({ onUnlock }) {
      const [pw, setPw] = useState("");
      const [error, setError] = useState("");
      function check() {
        if (pw === APP_PASSWORD) {
          sessionStorage.setItem("anken_unlocked", "1");
          onUnlock();
        } else {
          setError("パスワードが違います");
          setPw("");
        }
      }
      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:32,maxWidth:320,width:"100%",margin:"0 16px",boxShadow:"0 4px 20px #0002",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🚢</div>
            <div style={{fontWeight:800,fontSize:20,color:"#0f2744",marginBottom:8}}>案件管理</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>パスワードを入力してください</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&check()}
              placeholder="パスワード" style={{...S.input,marginBottom:12,textAlign:"center",fontSize:18,letterSpacing:4}} />
            {error && <div style={{color:"#dc2626",fontSize:12,marginBottom:12}}>{error}</div>}
            <button onClick={check} style={{...S.btn("#0f2744"),width:"100%",fontSize:15,padding:"12px"}}>
              ログイン
            </button>
          </div>
        </div>
      );
    }

    function ClientSelector({ c, clients, onChange }) {
      const cid = String(c.clientId||"");
      const selectedClient = clients.find(cl=>String(cl.id)===cid);
      const contacts = selectedClient ? (selectedClient.contacts||[]) : [];
      const ctid = String(c.contactId||"");
      function pickClient(sid) {
        const cl = clients.find(x=>String(x.id)===sid);
        onChange({...c, clientId:sid, client:cl?cl.name:"", contactId:"", contactName:""});
      }
      function pickContact(sid) {
        const ct = contacts.find(x=>String(x.id)===sid);
        onChange({...c, contactId:sid, contactName:ct?ct.name:""});
      }
      return (
        <div style={{marginBottom:14}}>
          <label style={S.label}>依頼元（会社）</label>
          <select value={cid} onChange={e=>pickClient(e.target.value)} style={{...S.input,marginBottom:8}}>
            <option value="">-- 選択してください --</option>
            {clients.map(cl=><option key={cl.id} value={String(cl.id)}>{cl.name}</option>)}
            <option value="__manual__">手入力する</option>
          </select>
          {cid==="__manual__" && <input value={c.client||""} onChange={e=>onChange({...c,client:e.target.value})} placeholder="会社名を入力" style={{...S.input,marginBottom:8}} />}
          {cid && cid!=="__manual__" && contacts.length>0 && <>
            <label style={S.label}>担当者</label>
            <select value={ctid} onChange={e=>pickContact(e.target.value)} style={{...S.input,marginBottom:8}}>
              <option value="">-- 担当者を選択 --</option>
              {contacts.map(ct=><option key={ct.id} value={String(ct.id)}>{ct.name}{ct.tel?`　${ct.tel}`:""}</option>)}
            </select>
          </>}
          {cid && cid!=="__manual__" && contacts.length===0 && <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>※ 顧客管理で担当者を登録できます</div>}
        </div>
      );
    }

    function DeleteConfirm({ onDelete }) {
      const [open, setOpen] = useState(false);
      if (!open) return <div style={{padding:"16px 16px 0"}}><button onClick={()=>setOpen(true)} style={{...S.btn("#fee2e2","#dc2626"),width:"100%",border:"1px solid #fca5a5"}}>🗑️ この案件を削除</button></div>;
      return (
        <div style={{margin:"16px 16px 0",background:"#fee2e2",borderRadius:12,padding:16,border:"1px solid #fca5a5"}}>
          <div style={{fontWeight:700,color:"#dc2626",marginBottom:12}}>本当に削除しますか？</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setOpen(false)} style={{...S.btn("#f1f5f9","#475569"),flex:1}}>キャンセル</button>
            <button onClick={onDelete} style={{...S.btn("#dc2626"),flex:1}}>削除する</button>
          </div>
        </div>
      );
    }

    function CaseDetail({ c, onChange, onBack, onDelete, clients, meetings, onAddMeeting, onDeleteMeeting }) {
      const [tabVal, setTabVal] = useState("basic");
      const [memoVal, setMemoVal] = useState("");
      function field(key, value) {
        const updated = {...c, [key]:value};
        if (key==="status") {
          const label = STATUS_LIST.find(s=>s.key===value)?.label||value;
          updated.history = [...(c.history||[]), {date:nowStr(), text:`ステータス → ${label}`}];
        }
        onChange(updated);
      }
      function addMemo() {
        if (!memoVal.trim()) return;
        onChange({...c, history:[...(c.history||[]), {date:nowStr(), text:memoVal.trim()}]});
        setMemoVal("");
      }
      const tabBtn = (t, label) => (
        <button onClick={()=>setTabVal(t)} style={{ padding:"8px 14px", border:"none", borderRadius:"8px 8px 0 0", fontSize:13, cursor:"pointer", fontWeight:tabVal===t?700:400, background:tabVal===t?"#fff":"#e8edf3", color:tabVal===t?"#0f2744":"#64748b" }}>{label}</button>
      );
      const isBorrowed = c.shipType==="借り船（傭船）";
      const caseMeetings = (meetings||[]).filter(m=>String(m.caseId)===String(c.id));
      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9",paddingBottom:48}}>
          <TopBar title={clientDisplayName(c,clients)||"依頼元未入力"} onBack={onBack} right={<StatusBadge statusKey={c.status} />} />
          <div style={{display:"flex",padding:"10px 16px 0",gap:3,overflowX:"auto"}}>{tabBtn("basic","基本情報")}{tabBtn("estimate","見積もり")}{tabBtn("meetings","打合せ記録")}{tabBtn("history","進捗履歴")}</div>
          <div style={{background:"#fff",padding:16,boxShadow:"0 1px 3px #0001"}}>
            {tabVal==="basic" && <>
              <ClientSelector c={c} clients={clients} onChange={onChange} />
              <Field label="件名" value={c.title} onChange={v=>field("title",v)} placeholder="例：富山港向け台船回航" />
              <Field label="打診日" type="date" value={c.inquiryDate} onChange={v=>field("inquiryDate",v)} />
              <div style={{marginBottom:14}}><label style={S.label}>ステータス</label><select value={c.status} onChange={e=>field("status",e.target.value)} style={S.input}>{STATUS_LIST.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}</select></div>
              <div style={{marginBottom:14}}><label style={S.label}>船種別</label><select value={c.shipType} onChange={e=>field("shipType",e.target.value)} style={S.input}>{SHIP_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <Field label="船名" value={c.shipName} onChange={v=>field("shipName",v)} placeholder="例：第三〇〇丸" />
              <div style={{marginBottom:14}}>
                <label style={S.label}>作業予定時期</label>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <input type="checkbox" checked={!!c.workUndecided} onChange={e=>field("workUndecided",e.target.checked)} style={{width:16,height:16,cursor:"pointer"}} />
                  <span style={{fontSize:14,color:"#475569"}}>時期未定</span>
                </div>
                {!c.workUndecided && <div style={{display:"flex",gap:6}}>
                  <select value={c.workYear||""} onChange={e=>field("workYear",e.target.value)} style={{...S.input,flex:2}}>
                    <option value="">年</option>
                    {Array.from({length:5},(_,i)=>new Date().getFullYear()+i).map(y=><option key={y} value={y}>{y}年</option>)}
                  </select>
                  <select value={c.workMonth||""} onChange={e=>field("workMonth",e.target.value)} style={{...S.input,flex:2}}>
                    <option value="">月</option>
                    {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}月</option>)}
                  </select>
                  <select value={c.workJun||""} onChange={e=>field("workJun",e.target.value)} style={{...S.input,flex:3}}>
                    <option value="">旬</option><option value="1">上旬</option><option value="2">中旬</option><option value="3">下旬</option>
                  </select>
                </div>}
              </div>
            </>}
            {tabVal==="estimate" && <>
              <Field label="見積もり額（円）" type="number" value={c.estimateAmount} onChange={v=>field("estimateAmount",v)} placeholder="例：1500000" />
              {isBorrowed && <>
                <div style={{background:"#fef9ec",borderLeft:"3px solid #f59e0b",borderRadius:8,padding:"9px 12px",marginBottom:14,fontSize:12,color:"#92400e"}}>⚠️ 借り船案件：下見積もり先・金額を必ず記録してください</div>
                {(c.subEstimates||[]).map((se,idx)=>(
                  <div key={se.id} style={{background:"#f8fafc",borderRadius:10,padding:"12px 12px 8px",marginBottom:10,border:"1px solid #e2e8f0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#64748b"}}>下見積もり先 {idx+1}</span>
                      <button onClick={()=>onChange({...c,subEstimates:(c.subEstimates||[]).filter(s=>s.id!==se.id)})} style={{background:"none",border:"none",color:"#dc2626",fontSize:12,cursor:"pointer"}}>削除</button>
                    </div>
                    <Field label="会社名" value={se.vendor} onChange={v=>onChange({...c,subEstimates:(c.subEstimates||[]).map(s=>s.id===se.id?{...s,vendor:v}:s)})} placeholder="例：〇〇海運" />
                    <Field label="下見積もり額（円）" type="number" value={se.amount} onChange={v=>onChange({...c,subEstimates:(c.subEstimates||[]).map(s=>s.id===se.id?{...s,amount:v}:s)})} placeholder="例：1200000" />

    function DataIO({ cases, clients, meetings, onImport, onClose }) {
      const [importText, setImportText] = useState("");
      const [msg, setMsg] = useState("");
      function doExport() {
        const data = JSON.stringify({ cases, clients, meetings }, null, 2);
        navigator.clipboard.writeText(data).then(()=>setMsg("✓ クリップボードにコピーしました")).catch(()=>setMsg("コピー失敗。下のテキストを手動でコピーしてください"));
      }
      function doImport() {
        try {
          const parsed = JSON.parse(importText);
          if (!Array.isArray(parsed.cases)||!Array.isArray(parsed.clients)) throw new Error();
          onImport(parsed.cases, parsed.clients, Array.isArray(parsed.meetings)?parsed.meetings:[]);
          setMsg("✓ 取り込み完了！");
          setImportText("");
        } catch { setMsg("エラー：正しいデータではありません"); }
      }
      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9",paddingBottom:40}}>
          <TopBar title="データ引き継ぎ" onBack={onClose} />
          <div style={{padding:16}}>
            <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 3px #0001"}}>
              <div style={{fontWeight:700,color:"#0f2744",marginBottom:8}}>📤 データを書き出す</div>
              <button onClick={doExport} style={{...S.btn("#0f2744"),width:"100%",marginBottom:10}}>クリップボードにコピー</button>
              <textarea readOnly value={JSON.stringify({cases,clients,meetings},null,2)} rows={6} style={{...S.input,fontSize:11,fontFamily:"monospace",resize:"vertical"}} onClick={e=>e.target.select()} />
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 3px #0001"}}>
              <div style={{fontWeight:700,color:"#0f2744",marginBottom:8}}>📥 データを取り込む</div>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={6} placeholder='{"cases":[...],"clients":[...],"meetings":[...]} の形式で貼り付け' style={{...S.input,fontSize:11,fontFamily:"monospace",resize:"vertical",marginBottom:10}} />
              <button onClick={doImport} style={{...S.btn("#15803d"),width:"100%"}} disabled={!importText.trim()}>取り込む</button>
            </div>
            {msg && <div style={{background:msg.startsWith("✓")?"#f0fdf4":"#fee2e2",borderRadius:8,padding:"10px 14px",fontSize:13,color:msg.startsWith("✓")?"#15803d":"#dc2626",fontWeight:600}}>{msg}</div>}
          </div>
        </div>
      );
    }

    function App() {
      const [unlocked, setUnlocked] = useState(!!sessionStorage.getItem("anken_unlocked"));
      const [cases,   setCases]   = useState([]);
      const [clients, setClients] = useState([]);
      const [meetings, setMeetings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saveState, setSaveState] = useState("idle");
      const [view,       setView]       = useState("list");
      const [selectedId, setSelectedId] = useState(null);
      const [filterStatus, setFilterStatus] = useState("all");
      const [showLost,     setShowLost]     = useState(false);
      const [sortOrder,    setSortOrder]    = useState("none");
      const [filterYear,   setFilterYear]   = useState("");
      const [filterMonth,  setFilterMonth]  = useState("");
      const [search, setSearch] = useState("");
      const [conflict, setConflict] = useState(false);
      const saveTimer  = useRef(null);
      const retryTimer = useRef(null);
      const lastKnownUpdatedAt = useRef(null); // 自分が最後に取得/保存した時点のサーバー側updated_at
      const isEditing = useRef(false);         // 直近の編集操作からの猶予中かどうか

      async function reloadFromServer() {
        try {
          const data = await sbLoad();
          if (data.cases)    setCases(data.cases);
          if (data.clients)  setClients(data.clients);
          setMeetings(data.meetings||[]);
          lastKnownUpdatedAt.current = data.updated_at || null;
        } catch(e) { console.error(e); }
      }

      useEffect(() => {
        if (!unlocked) return;
        (async () => {
          await reloadFromServer();
          setLoading(false);
        })();
      }, [unlocked]);

      // タブが再アクティブになったとき、編集中でなければ最新データを自動取得
      useEffect(() => {
        if (!unlocked) return;
        async function onVisible() {
          if (document.visibilityState !== "visible") return;
          if (loading || isEditing.current || conflict) return;
          try {
            const serverUpdatedAt = await sbCheckUpdatedAt();
            if (serverUpdatedAt && !tsEqual(serverUpdatedAt, lastKnownUpdatedAt.current)) {
              await reloadFromServer();
            }
          } catch(e) { console.error(e); }
        }
        document.addEventListener("visibilitychange", onVisible);
        window.addEventListener("focus", onVisible);
        return () => {
          document.removeEventListener("visibilitychange", onVisible);
          window.removeEventListener("focus", onVisible);
        };
      }, [unlocked, loading, conflict]);

      async function doSave(force) {
        clearTimeout(retryTimer.current);
        setSaveState("saving");
        try {
          if (!force) {
            const serverUpdatedAt = await sbCheckUpdatedAt();
            if (serverUpdatedAt && lastKnownUpdatedAt.current && !tsEqual(serverUpdatedAt, lastKnownUpdatedAt.current)) {
              // 他端末が自分の最後の取得後に保存している → 競合
              setSaveState("idle");
              setConflict(true);
              return;
            }
          }
          const nowIso = await sbSave(cases, clients, meetings);
          lastKnownUpdatedAt.current = nowIso;
          isEditing.current = false;
          setSaveState("saved");
          setTimeout(()=>setSaveState("idle"), 2500);
        } catch(e) {
          console.error(e);
          setSaveState("error");
          retryTimer.current = setTimeout(()=>doSave(force), 10000); // 10秒後に自動リトライ
        }
      }

      useEffect(() => {
        if (loading || !unlocked) return;
        isEditing.current = true;
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => doSave(false), SAVE_MS);
        return () => clearTimeout(saveTimer.current);
      }, [cases, clients, meetings]);

      if (!unlocked) return <PasswordScreen onUnlock={()=>setUnlocked(true)} />;

      const selected = cases.find(c=>c.id===selectedId);
      const alertCases = cases.filter(c=>c.shipType==="借り船（傭船）"&&!["completed","lost"].includes(c.status)&&!(c.subEstimates||[]).length);
      function workTimeVal(c) {
        if (c.workUndecided) return 99999999;
        return (Number(c.workYear)||9999)*10000+(Number(c.workMonth)||99)*100+(Number(c.workJun)||9);
      }
      const filtered = cases.filter(c => {
        if (filterStatus==="all" && c.status==="lost" && !showLost) return false;
        if (filterStatus!=="all"&&c.status!==filterStatus) return false;
        if (filterYear&&String(c.workYear)!==filterYear) return false;
        if (filterMonth&&String(c.workMonth)!==filterMonth) return false;
        const dn = clientDisplayName(c,clients);
        if (search&&!dn.includes(search)&&!c.title.includes(search)) return false;
        return true;
      });
      const sorted = sortOrder==="none" ? filtered : [...filtered].sort((a,b)=>{
        const diff = workTimeVal(a)-workTimeVal(b);
        return sortOrder==="asc"?diff:-diff;
      });
      const activeCount = cases.filter(c=>!["completed","lost"].includes(c.status)).length;
      function updateCase(u) { setCases(prev=>prev.map(c=>c.id===u.id?u:c)); }
      function deleteCase(id) {
        setCases(prev=>prev.filter(c=>c.id!==id));
        setMeetings(prev=>prev.filter(m=>String(m.caseId)!==String(id)));
        setView("list");
      }
      function addCase() { const nc=emptyCase(); setCases(prev=>[nc,...prev]); setSelectedId(nc.id); setView("detail"); }
      function addMeeting(data) { setMeetings(prev=>[...prev, {id:String(Date.now()), ...data}]); }
      function deleteMeeting(id) { setMeetings(prev=>prev.filter(m=>m.id!==id)); }

      if (loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}><div style={{textAlign:"center",color:"#64748b"}}><div style={{fontSize:32,marginBottom:8}}>🚢</div><div>読み込み中…</div></div></div>;

      const conflictModal = conflict && <ConflictModal
        onReload={async ()=>{ setConflict(false); await reloadFromServer(); }}
        onForceSave={async ()=>{ setConflict(false); await doSave(true); }}
      />;

      if (view==="dataio")  return <>{conflictModal}<DataIO cases={cases} clients={clients} meetings={meetings} onImport={(c,cl,mt)=>{setCases(c);setClients(cl);setMeetings(mt||[]);}} onClose={()=>setView("list")} /></>;
      if (view==="clients") return <>{conflictModal}<ClientManager clients={clients} onClose={()=>setView("list")} onUpdate={setClients} meetings={meetings} cases={cases} /></>;
      if (view==="detail"&&selected) return <>{conflictModal}<CaseDetail c={selected} onChange={updateCase} onBack={()=>setView("list")} onDelete={deleteCase} clients={clients} meetings={meetings} onAddMeeting={addMeeting} onDeleteMeeting={deleteMeeting} /></>;

      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
          <TopBar title="🚢 案件管理" right={
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setView("dataio")} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"5px 11px",fontSize:12,cursor:"pointer"}}>引き継ぎ</button>
              <button onClick={()=>setView("clients")} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"5px 11px",fontSize:12,cursor:"pointer"}}>顧客管理</button>
              <button onClick={()=>{sessionStorage.removeItem("anken_unlocked");setUnlocked(false);}} style={{background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 11px",fontSize:11,cursor:"pointer"}}>ロック</button>
            </div>
          } />
          <SaveIndicator state={saveState} />
          {conflictModal}
          <div style={{display:"flex",background:"#0f2744",padding:"0 16px 12px"}}>
            {[{label:"全案件",value:cases.length},{label:"進行中",value:activeCount},{label:"今月受注",value:cases.filter(c=>c.status==="ordered"&&c.inquiryDate?.startsWith(new Date().toISOString().slice(0,7))).length}].map((s,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",color:"#fff"}}>
                <div style={{fontSize:22,fontWeight:800}}>{s.value}</div>
                <div style={{fontSize:11,opacity:0.6}}>{s.label}</div>
              </div>
            ))}
          </div>
          {alertCases.length>0 && <div style={{background:"#fffbeb",borderLeft:"4px solid #f59e0b",margin:"12px 16px 0",borderRadius:8,padding:"10px 13px"}}>
            <div style={{fontWeight:700,color:"#92400e",fontSize:13}}>⚠️ 下見積もり未入力 {alertCases.length}件</div>
            {alertCases.map(c=><div key={c.id} onClick={()=>{setSelectedId(c.id);setView("detail");}} style={{fontSize:12,color:"#b45309",marginTop:3,cursor:"pointer"}}>→ {clientDisplayName(c,clients)||"（依頼元未入力）"}｜{c.title||"件名未入力"}</div>)}
          </div>}
          <div style={{padding:"12px 16px 0"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 依頼元・件名で検索…" style={S.input} /></div>
          <div style={{padding:"8px 16px 0",display:"flex",gap:6}}>
            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{...S.input,flex:1,padding:"7px 8px",fontSize:13}}>
              <option value="">年（すべて）</option>
              {Array.from({length:5},(_,i)=>new Date().getFullYear()+i).map(y=><option key={y} value={y}>{y}年</option>)}
            </select>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{...S.input,flex:1,padding:"7px 8px",fontSize:13}}>
              <option value="">月（すべて）</option>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}月</option>)}
            </select>
            {(filterYear||filterMonth) && <button onClick={()=>{setFilterYear("");setFilterMonth("");}} style={{...S.btn("#fee2e2","#dc2626"),padding:"7px 12px",fontSize:12,whiteSpace:"nowrap"}}>✕ クリア</button>}
          </div>
          <div style={{padding:"6px 16px 0",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap"}}>作業日順：</span>
            {[["none","指定なし"],["asc","↑ 昇順"],["desc","↓ 降順"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSortOrder(v)} style={{borderRadius:20,padding:"4px 11px",fontSize:12,cursor:"pointer",fontWeight:sortOrder===v?700:400,background:sortOrder===v?"#0f2744":"#fff",color:sortOrder===v?"#fff":"#475569",border:`1px solid ${sortOrder===v?"#0f2744":"#cbd5e1"}`}}>{l}</button>
            ))}
          </div>
          <div style={{padding:"10px 16px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {[{key:"all",label:"すべて",color:"#0f2744"},...STATUS_LIST.filter(s=>s.key!=="lost")].map(s=>(
              <button key={s.key} onClick={()=>setFilterStatus(s.key)} style={{borderRadius:20,padding:"4px 12px",border:`1px solid ${filterStatus===s.key?s.color:"#cbd5e1"}`,background:filterStatus===s.key?s.color:"#fff",color:filterStatus===s.key?"#fff":s.color,fontSize:12,whiteSpace:"nowrap",cursor:"pointer",fontWeight:filterStatus===s.key?700:400}}>{s.label}</button>
            ))}
            <button onClick={()=>setShowLost(v=>!v)} style={{borderRadius:20,padding:"4px 12px",border:`1px solid ${showLost?"#dc2626":"#cbd5e1"}`,background:showLost?"#dc2626":"#fff",color:showLost?"#fff":"#dc2626",fontSize:12,whiteSpace:"nowrap",cursor:"pointer",fontWeight:showLost?700:400}}>失注</button>
          </div>
          <div style={{padding:"12px 16px"}}>
            {sorted.length===0 && <div style={{textAlign:"center",color:"#94a3b8",padding:"50px 0"}}><div style={{fontSize:36,marginBottom:8}}>📋</div><div>{search||filterStatus!=="all"||filterYear||filterMonth?"該当する案件がありません":"案件を追加してください"}</div></div>}
            {sorted.map(c=><CaseCard key={c.id} c={c} onClick={()=>{setSelectedId(c.id);setView("detail");}} clients={clients} />)}
          </div>
          <button onClick={addCase} style={{position:"fixed",bottom:24,right:20,width:58,height:58,borderRadius:"50%",background:"#0f2744",color:"#fff",fontSize:30,border:"none",boxShadow:"0 4px 16px #0003",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>＋</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
