<body>
  <div id="root"><div style="min-height: 100vh; background: rgb(241, 245, 249); display: flex; align-items: center; justify-content: center;"><div style="background: rgb(255, 255, 255); border-radius: 16px; padding: 32px; max-width: 340px; width: 100%; margin: 0px 16px; box-shadow: rgba(0, 0, 0, 0.133) 0px 4px 20px; text-align: center;"><div style="font-size: 48px; margin-bottom: 12px;">🚢</div><div style="font-weight: 800; font-size: 20px; color: rgb(15, 39, 68); margin-bottom: 8px;">案件管理</div><div style="font-size: 13px; color: rgb(100, 116, 139); margin-bottom: 24px;">Microsoftアカウントでログインして<br>OneDriveにデータを保存します</div><button style="background: rgb(15, 39, 68); color: rgb(255, 255, 255); border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; border-radius: 8px; padding: 14px; font-weight: 700; cursor: pointer; font-size: 15px; width: 100%; opacity: 1;">🔑 Microsoftでログイン</button></div></div></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Azure / Microsoft設定 ────────────────────────────────
    const CLIENT_ID = "31411124-c9a3-4c1a-b357-343c1650b98c";
    const TENANT    = "shinko1.onmicrosoft.com";
    const REDIRECT  = "https://shinko-hirose-haisen.github.io/anken-kanri/";
    const SCOPES    = ["Files.ReadWrite", "User.Read"];
    const FILE_NAME = "anken-kanri-data.json";
    const SAVE_MS   = 2000;

    // ─── PKCE認証ヘルパー ─────────────────────────────────────
    function b64url(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    }
    async function genPKCE() {
      const v = b64url(crypto.getRandomValues(new Uint8Array(32)));
      const d = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v));
      return { verifier: v, challenge: b64url(d) };
    }

    function saveToken(t) { try { sessionStorage.setItem("anken_token", JSON.stringify(t)); } catch {} }
    function loadToken() { try { return JSON.parse(sessionStorage.getItem("anken_token")); } catch { return null; } }
    function clearToken() { try { sessionStorage.removeItem("anken_token"); } catch {} }

    // ─── OneDrive API ─────────────────────────────────────────
    async function odLoad(token) {
      const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/root:/${FILE_NAME}:/content`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`load ${res.status}`);
      return res.json();
    }
    async function odSave(token, cases, clients) {
      const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/root:/${FILE_NAME}:/content`,
        {
          method: "PUT",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ cases, clients }),
        }
      );
      if (!res.ok) throw new Error(`save ${res.status}`);
    }

    // ─── 定数・ヘルパー ───────────────────────────────────────
    const STATUS_LIST = [
      { key:"inquiry",    label:"打診受付", color:"#64748b", bg:"#f1f5f9" },
      { key:"estimating", label:"見積中",   color:"#b45309", bg:"#fef3c7" },
      { key:"waiting",    label:"回答待ち", color:"#1d4ed8", bg:"#dbeafe" },
      { key:"ordered",    label:"受注",     color:"#15803d", bg:"#dcfce7" },
      { key:"inprogress", label:"進行中",   color:"#7c3aed", bg:"#ede9fe" },
      { key:"completed",  label:"完了",     color:"#374151", bg:"#e5e7eb" },
      { key:"lost",       label:"失注",     color:"#dc2626", bg:"#fee2e2" },
    ];
    const SHIP_TYPES = ["自社船","借り船（傭船）"];
    const nowStr  = () => new Date().toISOString().slice(0,16).replace("T"," ");
    const dateStr = () => new Date().toISOString().slice(0,10);
    const fmtYen  = v => v ? `¥${Number(v).toLocaleString()}` : "—";
    const emptyCase = () => ({
      id: String(Date.now()), clientId:"", contactId:"", client:"", contactName:"",
      title:"", status:"inquiry", inquiryDate:dateStr(),
      shipType:"自社船", shipName:"", estimateAmount:"", subEstimates:[],
      workUndecided:false, workYear:"", workMonth:"", workJun:"", notes:"",
      history:[{ date:nowStr(), text:"案件登録" }],
    });
    const emptySubEstimate = () => ({ id:String(Date.now()), vendor:"", amount:"" });
    const emptyContact     = () => ({ id:String(Date.now()), name:"", tel:"", email:"", memo:"" });
    const JUN_LABELS = ["","上旬","中旬","下旬"];
    function fmtWorkTime(c) {
      if (c.workUndecided) return "時期未定";
      if (!c.workYear && !c.workMonth) return null;
      let s = c.workYear ? `${c.workYear}年` : "";
      if (c.workMonth) s += `${c.workMonth}月`;
      if (c.workJun) s += JUN_LABELS[c.workJun]||"";
      return s||null;
    }
    function clientDisplayName(c, clients) {
      const cid = String(c.clientId||"");
      if (cid && cid !== "__manual__") {
        const cl = clients.find(x => String(x.id) === cid);
        if (cl) return cl.name;
      }
      return c.client||"";
    }

    // ─── スタイル ─────────────────────────────────────────────
    const S = {
      label: { display:"block", fontSize:11, color:"#64748b", marginBottom:3, fontWeight:700 },
      input: { width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, color:"#1e293b", background:"#f8fafc", boxSizing:"border-box" },
      btn: (bg, color="#fff") => ({ background:bg, color, border:"none", borderRadius:8, padding:"10px 18px", fontWeight:700, cursor:"pointer", fontSize:14 }),
    };

    // ─── 共通コンポーネント ───────────────────────────────────
    function Field({ label, value, onChange, type="text", placeholder, rows }) {
      const el = rows
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} style={{...S.input,resize:"vertical"}} />
        : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={S.input} />;
      return <div style={{marginBottom:14}}><label style={S.label}>{label}</label>{el}</div>;
    }
    function StatusBadge({ statusKey, small }) {
      const s = STATUS_LIST.find(s=>s.key===statusKey)||STATUS_LIST[0];
      return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.color}44`, borderRadius:20, padding:small?"1px 8px":"3px 11px", fontSize:small?11:12, fontWeight:700, whiteSpace:"nowrap" }}>{s.label}</span>;
    }
    function TopBar({ title, onBack, right }) {
      return (
        <div style={{ background:"#0f2744", color:"#fff", padding:"13px 16px", display:"flex", alignItems:"center", gap:10, position:"sticky", top:0, zIndex:10 }}>
          {onBack && <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",lineHeight:1}}>←</button>}
          <span style={{flex:1, fontWeight:800, fontSize:16}}>{title}</span>
          {right}
        </div>
      );
    }
    function SaveIndicator({ state }) {
      const map = { saving:"保存中…", saved:"✓ OneDriveに保存済み", error:"保存失敗" };
      const col  = { saving:"#94a3b8", saved:"#22c55e", error:"#ef4444" };
      if (state==="idle") return null;
      return <div style={{textAlign:"center",fontSize:11,color:col[state],padding:"4px 0",background:"#f0fdf4"}}>{map[state]}</div>;
    }

    // ─── ClientSelector ───────────────────────────────────────
    function ClientSelector({ c, clients, onChange }) {
      const cid = String(c.clientId||"");
      const selectedClient = clients.find(cl=>String(cl.id)===cid);
      const contacts = selectedClient ? (selectedClient.contacts||[]) : [];
      const ctid = String(c.contactId||"");
      function pickClient(sid) {
        const cl = clients.find(x=>String(x.id)===sid);
        onChange({...c, clientId:sid, client:cl?cl.name:"", contactId:"", contactName:""});
      }
      function pickContact(sid) {
        const ct = contacts.find(x=>String(x.id)===sid);
        onChange({...c, contactId:sid, contactName:ct?ct.name:""});
      }
      return (
        <div style={{marginBottom:14}}>
          <label style={S.label}>依頼元（会社）</label>
          <select value={cid} onChange={e=>pickClient(e.target.value)} style={{...S.input,marginBottom:8}}>
            <option value="">-- 選択してください --</option>
            {clients.map(cl=><option key={cl.id} value={String(cl.id)}>{cl.name}</option>)}
            <option value="__manual__">手入力する</option>
          </select>
          {cid==="__manual__" && <input value={c.client||""} onChange={e=>onChange({...c,client:e.target.value})} placeholder="会社名を入力" style={{...S.input,marginBottom:8}} />}
          {cid && cid!=="__manual__" && contacts.length>0 && <>
            <label style={S.label}>担当者</label>
            <select value={ctid} onChange={e=>pickContact(e.target.value)} style={{...S.input,marginBottom:8}}>
              <option value="">-- 担当者を選択 --</option>
              {contacts.map(ct=><option key={ct.id} value={String(ct.id)}>{ct.name}{ct.tel?`　${ct.tel}`:""}</option>)}
            </select>
          </>}
          {cid && cid!=="__manual__" && contacts.length===0 && <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>※ 顧客管理で担当者を登録できます</div>}
        </div>
      );
    }

    // ─── DeleteConfirm ────────────────────────────────────────
    function DeleteConfirm({ onDelete }) {
      const [open, setOpen] = useState(false);
      if (!open) return <div style={{padding:"16px 16px 0"}}><button onClick={()=>setOpen(true)} style={{...S.btn("#fee2e2","#dc2626"),width:"100%",border:"1px solid #fca5a5"}}>🗑️ この案件を削除</button></div>;
      return (
        <div style={{margin:"16px 16px 0",background:"#fee2e2",borderRadius:12,padding:16,border:"1px solid #fca5a5"}}>
          <div style={{fontWeight:700,color:"#dc2626",marginBottom:12}}>本当に削除しますか？</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setOpen(false)} style={{...S.btn("#f1f5f9","#475569"),flex:1}}>キャンセル</button>
            <button onClick={onDelete} style={{...S.btn("#dc2626"),flex:1}}>削除する</button>
          </div>
        </div>
      );
    }

    // ─── CaseDetail ───────────────────────────────────────────
    function CaseDetail({ c, onChange, onBack, onDelete, clients }) {
      const [tab,memo,setTab,setMemo] = [useState("basic"),useState(""),null,null].reduce((a,v,i)=>i<2?[...a,v[0],v[1]]:[...a,v],[]);
      // 上記は読みにくいので分解
      const [tabVal,  setTabVal]  = useState("basic");
      const [memoVal, setMemoVal] = useState("");
      function field(key, value) {
        const updated = {...c, [key]:value};
        if (key==="status") {
          const label = STATUS_LIST.find(s=>s.key===value)?.label||value;
          updated.history = [...(c.history||[]), {date:nowStr(), text:`ステータス → ${label}`}];
        }
        onChange(updated);
      }
      function addMemo() {
        if (!memoVal.trim()) return;
        onChange({...c, history:[...(c.history||[]), {date:nowStr(), text:memoVal.trim()}]});
        setMemoVal("");
      }
      const tabBtn = (t, label) => (
        <button onClick={()=>setTabVal(t)} style={{ padding:"8px 14px", border:"none", borderRadius:"8px 8px 0 0", fontSize:13, cursor:"pointer", fontWeight:tabVal===t?700:400, background:tabVal===t?"#fff":"#e8edf3", color:tabVal===t?"#0f2744":"#64748b" }}>{label}</button>

    // ─── DataIO ───────────────────────────────────────────────
    function DataIO({ cases, clients, onImport, onClose }) {
      const [importText, setImportText] = useState("");
      const [msg, setMsg] = useState("");
      function doExport() {
        const data = JSON.stringify({ cases, clients }, null, 2);
        navigator.clipboard.writeText(data).then(()=>setMsg("✓ クリップボードにコピーしました")).catch(()=>setMsg("コピー失敗。下のテキストを手動でコピーしてください"));
      }
      function doImport() {
        try {
          const parsed = JSON.parse(importText);
          if (!Array.isArray(parsed.cases)||!Array.isArray(parsed.clients)) throw new Error();
          onImport(parsed.cases, parsed.clients);
          setMsg("✓ 取り込み完了！");
          setImportText("");
        } catch { setMsg("エラー：正しいデータではありません"); }
      }
      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9",paddingBottom:40}}>
          <TopBar title="データ引き継ぎ" onBack={onClose} />
          <div style={{padding:16}}>

              <button onClick={doExport} style={{...S.btn("#0f2744"),width:"100%",marginBottom:10}}>クリップボードにコピー</button>

              <div style={{fontWeight:700,color:"#0f2744",marginBottom:8}}>📥 データを取り込む</div>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={6} placeholder='{"cases":[...],"clients":[...]} の形式で貼り付け' style={{...S.input,fontSize:11,fontFamily:"monospace",resize:"vertical",marginBottom:10}} />
              <button onClick={doImport} style={{...S.btn("#15803d"),width:"100%"}} disabled={!importText.trim()}>取り込む</button>

          </div>

    // ─── LoginScreen ──────────────────────────────────────────
    function LoginScreen() {
      const [loading, setLoading] = useState(false);
      const [error, setError]     = useState("");
      async function doLogin() {
        setLoading(true); setError("");
        try {
          const { verifier, challenge } = await genPKCE();
          sessionStorage.setItem("pkce_verifier", verifier);
          const params = new URLSearchParams({
            client_id: CLIENT_ID, response_type: "code",
            redirect_uri: REDIRECT,
            scope: SCOPES.join(" ") + " offline_access",
            code_challenge: challenge, code_challenge_method: "S256",
            response_mode: "query",
          });
          window.location.href = `https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${params}`;
        } catch(e) { setError(e.message); setLoading(false); }
      }
      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:32,maxWidth:340,width:"100%",margin:"0 16px",boxShadow:"0 4px 20px #0002",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🚢</div>
            <div style={{fontWeight:800,fontSize:20,color:"#0f2744",marginBottom:8}}>案件管理</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>Microsoftアカウントでログインして<br/>OneDriveにデータを保存します</div>
            <button onClick={doLogin} disabled={loading} style={{...S.btn("#0f2744"),width:"100%",fontSize:15,padding:"14px",opacity:loading?0.6:1}}>
              {loading ? "リダイレクト中…" : "🔑 Microsoftでログイン"}
            </button>
            {error && <div style={{marginTop:12,fontSize:12,color:"#dc2626"}}>{error}</div>}
          </div>
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────
    function App() {
      const [token,     setToken]     = useState(null);
      const [authState, setAuthState] = useState("checking");
      const [authError, setAuthError] = useState("");
      const [cases,     setCases]     = useState([]);
      const [clients,   setClients]   = useState([]);
      const [loading,   setLoading]   = useState(true);
      const [saveState, setSaveState] = useState("idle");
      const [view,       setView]       = useState("list");
      const [selectedId, setSelectedId] = useState(null);
      const [filterStatus, setFilterStatus] = useState("all");
      const [sortOrder,    setSortOrder]    = useState("none");
      const [filterYear,   setFilterYear]   = useState("");
      const [filterMonth,  setFilterMonth]  = useState("");
      const [search, setSearch] = useState("");
      const saveTimer = useRef(null);

      // 認証処理
      useEffect(() => {
        (async () => {
          const params = new URLSearchParams(window.location.search);
          const code   = params.get("code");
          const verifier = sessionStorage.getItem("pkce_verifier");
          if (code && verifier) {
            try {
              const res = await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                  client_id: CLIENT_ID, grant_type: "authorization_code", code,
                  redirect_uri: REDIRECT, code_verifier: verifier,
                  scope: SCOPES.join(" ") + " offline_access",
                }),
              });
              const data = await res.json();
              if (data.access_token) {
                saveToken(data); setToken(data.access_token);
                sessionStorage.removeItem("pkce_verifier");
                window.history.replaceState({}, "", window.location.pathname);
                setAuthState("ready");
              } else throw new Error(data.error_description||"トークン取得失敗");
            } catch(e) { setAuthError(e.message); setAuthState("error"); }
            return;
          }
          const saved = loadToken();
          if (saved?.access_token) { setToken(saved.access_token); setAuthState("ready"); }
          else setAuthState("login");
        })();
      }, []);

      // データ読み込み
      useEffect(() => {
        if (authState !== "ready" || !token) return;
        (async () => {
          try {
            const data = await odLoad(token);
            if (data) { setCases(data.cases||[]); setClients(data.clients||[]); }
          } catch(e) { console.error(e); }
          setLoading(false);
        })();
      }, [authState, token]);

      // 自動保存
      useEffect(() => {
        if (loading || !token) return;
        setSaveState("saving");
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          try {
            await odSave(token, cases, clients);
            setSaveState("saved");
            setTimeout(()=>setSaveState("idle"), 2500);
          } catch(e) {
            setSaveState("error");
            if (e.message.includes("401")) { clearToken(); setAuthState("login"); }
          }
        }, SAVE_MS);
      }, [cases, clients]);

      const selected = cases.find(c=>c.id===selectedId);
      const alertCases = cases.filter(c=>c.shipType==="借り船（傭船）"&&!["completed","lost"].includes(c.status)&&!(c.subEstimates||[]).length);
      function workTimeVal(c) {
        if (c.workUndecided) return 99999999;
        return (Number(c.workYear)||9999)*10000+(Number(c.workMonth)||99)*100+(Number(c.workJun)||9);
      }
      const filtered = cases.filter(c => {
        if (filterStatus==="all" && c.status==="lost" && !showLost) return false;
        if (filterStatus!=="all"&&c.status!==filterStatus) return false;
        if (filterYear&&String(c.workYear)!==filterYear) return false;
        if (filterMonth&&String(c.workMonth)!==filterMonth) return false;
        const dn = clientDisplayName(c,clients);
        if (search&&!dn.includes(search)&&!c.title.includes(search)) return false;
        return true;
      });
      const sorted = sortOrder==="none" ? filtered : [...filtered].sort((a,b)=>{
        const diff = workTimeVal(a)-workTimeVal(b);
        return sortOrder==="asc"?diff:-diff;
      });
      const activeCount = cases.filter(c=>!["completed","lost"].includes(c.status)).length;
      function updateCase(u) { setCases(prev=>prev.map(c=>c.id===u.id?u:c)); }
      function deleteCase(id) { setCases(prev=>prev.filter(c=>c.id!==id)); setView("list"); }
      function addCase() { const nc=emptyCase(); setCases(prev=>[nc,...prev]); setSelectedId(nc.id); setView("detail"); }

      if (authState==="checking") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}><div style={{textAlign:"center",color:"#64748b"}}><div style={{fontSize:32,marginBottom:8}}>🚢</div><div>認証確認中…</div></div></div>;
      if (authState==="login")    return <LoginScreen />;
      if (authState==="error")    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}><div style={{textAlign:"center",color:"#dc2626",padding:32}}><div style={{fontSize:32,marginBottom:8}}>⚠️</div><div style={{marginBottom:16}}>{authError}</div><button onClick={()=>{clearToken();setAuthState("login");}} style={S.btn("#0f2744")}>再ログイン</button></div></div>;
      if (loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}><div style={{textAlign:"center",color:"#64748b"}}><div style={{fontSize:32,marginBottom:8}}>🚢</div><div>OneDriveからデータ読み込み中…</div></div></div>;
      if (view==="dataio")  return <DataIO cases={cases} clients={clients} onImport={(c,cl)=>{setCases(c);setClients(cl);}} onClose={()=>setView("list")} />;
      if (view==="clients") return <ClientManager clients={clients} onClose={()=>setView("list")} onUpdate={setClients} />;
      if (view==="detail"&&selected) return <CaseDetail c={selected} onChange={updateCase} onBack={()=>setView("list")} onDelete={deleteCase} clients={clients} />;

      return (
        <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
          <TopBar title="🚢 案件管理" right={
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setView("dataio")} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"5px 11px",fontSize:12,cursor:"pointer"}}>引き継ぎ</button>
              <button onClick={()=>setView("clients")} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"5px 11px",fontSize:12,cursor:"pointer"}}>顧客管理</button>
              <button onClick={()=>{clearToken();setAuthState("login");}} style={{background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 11px",fontSize:11,cursor:"pointer"}}>ログアウト</button>
            </div>
          } />
          <SaveIndicator state={saveState} />
          <div style={{display:"flex",background:"#0f2744",padding:"0 16px 12px"}}>
            {[{label:"全案件",value:cases.length},{label:"進行中",value:activeCount},{label:"今月受注",value:cases.filter(c=>c.status==="ordered"&&c.inquiryDate?.startsWith(new Date().toISOString().slice(0,7))).length}].map((s,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",color:"#fff"}}>
                <div style={{fontSize:22,fontWeight:800}}>{s.value}</div>
                <div style={{fontSize:11,opacity:0.6}}>{s.label}</div>
              </div>
            ))}
          </div>
          {alertCases.length>0 && <div style={{background:"#fffbeb",borderLeft:"4px solid #f59e0b",margin:"12px 16px 0",borderRadius:8,padding:"10px 13px"}}>
            <div style={{fontWeight:700,color:"#92400e",fontSize:13}}>⚠️ 下見積もり未入力 {alertCases.length}件</div>
            {alertCases.map(c=><div key={c.id} onClick={()=>{setSelectedId(c.id);setView("detail");}} style={{fontSize:12,color:"#b45309",marginTop:3,cursor:"pointer"}}>→ {clientDisplayName(c,clients)||"（依頼元未入力）"}｜{c.title||"件名未入力"}</div>)}
          </div>}
          <div style={{padding:"12px 16px 0"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 依頼元・件名で検索…" style={S.input} /></div>
          <div style={{padding:"8px 16px 0",display:"flex",gap:6}}>
            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{...S.input,flex:1,padding:"7px 8px",fontSize:13}}>
              <option value="">年（すべて）</option>
              {Array.from({length:5},(_,i)=>new Date().getFullYear()+i).map(y=><option key={y} value={y}>{y}年</option>)}
            </select>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{...S.input,flex:1,padding:"7px 8px",fontSize:13}}>
              <option value="">月（すべて）</option>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}月</option>)}
            </select>
            {(filterYear||filterMonth) && <button onClick={()=>{setFilterYear("");setFilterMonth("");}} style={{...S.btn("#fee2e2","#dc2626"),padding:"7px 12px",fontSize:12,whiteSpace:"nowrap"}}>✕ クリア</button>}
          </div>
          <div style={{padding:"6px 16px 0",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap"}}>作業日順：</span>
            {[["none","指定なし"],["asc","↑ 昇順"],["desc","↓ 降順"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSortOrder(v)} style={{borderRadius:20,padding:"4px 11px",fontSize:12,cursor:"pointer",fontWeight:sortOrder===v?700:400,background:sortOrder===v?"#0f2744":"#fff",color:sortOrder===v?"#fff":"#475569",border:`1px solid ${sortOrder===v?"#0f2744":"#cbd5e1"}`}}>{l}</button>
            ))}
          </div>
          <div style={{padding:"10px 16px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {[{key:"all",label:"すべて",color:"#0f2744"},...STATUS_LIST].map(s=>(
              <button key={s.key} onClick={()=>setFilterStatus(s.key)} style={{borderRadius:20,padding:"4px 12px",border:`1px solid ${filterStatus===s.key?s.color:"#cbd5e1"}`,background:filterStatus===s.key?s.color:"#fff",color:filterStatus===s.key?"#fff":s.color,fontSize:12,whiteSpace:"nowrap",cursor:"pointer",fontWeight:filterStatus===s.key?700:400}}>{s.label}</button>
            ))}
          </div>
          <div style={{padding:"12px 16px"}}>
            {sorted.length===0 && <div style={{textAlign:"center",color:"#94a3b8",padding:"50px 0"}}><div style={{fontSize:36,marginBottom:8}}>📋</div><div>{search||filterStatus!=="all"||filterYear||filterMonth?"該当する案件がありません":"案件を追加してください"}</div></div>}
            {sorted.map(c=><CaseCard key={c.id} c={c} onClick={()=>{setSelectedId(c.id);setView("detail");}} clients={clients} />)}
          </div>
          <button onClick={addCase} style={{position:"fixed",bottom:24,right:20,width:58,height:58,borderRadius:"50%",background:"#0f2744",color:"#fff",fontSize:30,border:"none",boxShadow:"0 4px 16px #0003",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>＋</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body></html>
